<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Walnut sepia backdrop, dimmer at top, deeper at bottom -->
    <linearGradient id="bg" x1="50" y1="0" x2="50" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#221A10"/>
      <stop offset="55%"  stop-color="#15110A"/>
      <stop offset="100%" stop-color="#0A0805"/>
    </linearGradient>
    <!-- Highway dust haze along the lower horizon -->
    <radialGradient id="haze" cx="50" cy="86" r="58" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#D2934A" stop-opacity="0.32"/>
      <stop offset="55%"  stop-color="#B36A3A" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#B36A3A" stop-opacity="0"/>
    </radialGradient>
    <!-- Aged paper for the highway shield -->
    <linearGradient id="paper" x1="50" y1="14" x2="50" y2="86" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#F4EAD0"/>
      <stop offset="60%"  stop-color="#E5D2A3"/>
      <stop offset="100%" stop-color="#C8AB72"/>
    </linearGradient>
    <clipPath id="round">
      <rect width="100" height="100" rx="14"/>
    </clipPath>
  </defs>

  <g clip-path="url(#round)">
    <!-- Background walnut -->
    <rect width="100" height="100" fill="url(#bg)"/>

    <!-- Sepia dust haze -->
    <rect width="100" height="100" fill="url(#haze)"/>

    <!-- Subtle horizon line — Highway 61 vanishing point -->
    <line x1="0" y1="84" x2="100" y2="84" stroke="#604A2E" stroke-width="0.6" opacity="0.55"/>

    <!--
      US Highway shield. Trapezoid top (the "U.S." banner), with a curved
      shield underneath. Drawn slightly weathered with a dark walnut border.
    -->
    <path d="M 22 14
             L 78 14
             L 78 26
             L 84 26
             L 84 50
             Q 84 70 50 86
             Q 16 70 16 50
             L 16 26
             L 22 26
             Z"
          fill="url(#paper)"
          stroke="#2C2014"
          stroke-width="2.2"
          stroke-linejoin="round"/>

    <!-- "U.S." banner text in the top trapezoid -->
    <text x="50" y="23.5"
          text-anchor="middle"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="8.5"
          font-weight="700"
          fill="#2C2014"
          letter-spacing="0.4">U.S.</text>

    <!-- Banner separator line -->
    <line x1="22" y1="26.5" x2="78" y2="26.5" stroke="#2C2014" stroke-width="1.1" opacity="0.85"/>

    <!-- Route number "61" — the Highway Dylan revisited -->
    <text x="50" y="62"
          text-anchor="middle"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="34"
          font-weight="700"
          fill="#2C2014"
          letter-spacing="-0.5">61</text>

    <!-- Subtle paper grain shadow inside the shield -->
    <path d="M 22 14
             L 78 14
             L 78 26
             L 84 26
             L 84 50
             Q 84 70 50 86
             Q 16 70 16 50
             L 16 26
             L 22 26
             Z"
          fill="none"
          stroke="#604A2E"
          stroke-width="0.6"
          opacity="0.4"
          transform="translate(1.2, 1.4)"/>

    <!-- Outer border for depth, matching Doors/Eagles favicon style -->
    <rect width="100" height="100" fill="none" stroke="#3A2A18" stroke-width="1.2" opacity="0.5"/>
  </g>
</svg>
