<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Sky gradient — pale azure top to deeper cobalt at horizon -->
    <linearGradient id="sky" x1="50" y1="0" x2="50" y2="62" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#BFE0F2"/>
      <stop offset="55%"  stop-color="#5AA3D6"/>
      <stop offset="100%" stop-color="#1F6FB2"/>
    </linearGradient>
    <!-- Bright high noon sun -->
    <radialGradient id="sun" cx="50" cy="32" r="14" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FFFCEC"/>
      <stop offset="60%"  stop-color="#FFF1B8"/>
      <stop offset="100%" stop-color="#FFD566" stop-opacity="0"/>
    </radialGradient>
    <!-- Soft sky bloom around the sun -->
    <radialGradient id="bloom" cx="50" cy="32" r="42" gradientUnits="userSpaceOnUse">
      <stop offset="35%"  stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.22"/>
    </radialGradient>
    <!-- Desert ground — warm sand fading darker -->
    <linearGradient id="ground" x1="50" y1="62" x2="50" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#E8B97A"/>
      <stop offset="55%"  stop-color="#C9854A"/>
      <stop offset="100%" stop-color="#7A4422"/>
    </linearGradient>
    <clipPath id="round">
      <rect width="100" height="100" rx="14"/>
    </clipPath>
  </defs>

  <g clip-path="url(#round)">
    <!-- Sky -->
    <rect width="100" height="62" fill="url(#sky)"/>

    <!-- Atmospheric bloom around the sun -->
    <rect width="100" height="62" fill="url(#bloom)"/>

    <!-- High noon sun -->
    <circle cx="50" cy="32" r="9" fill="url(#sun)"/>

    <!-- Wispy clouds -->
    <ellipse cx="22" cy="22" rx="11" ry="2.2" fill="#FFFFFF" opacity="0.55"/>
    <ellipse cx="78" cy="18" rx="8" ry="1.8" fill="#FFFFFF" opacity="0.45"/>

    <!-- Distant blue mountain silhouette on horizon -->
    <path d="M 0 62 L 12 54 L 22 60 L 34 50 L 46 58 L 58 48 L 70 56 L 82 50 L 100 60 L 100 62 Z"
          fill="#1A4F82" opacity="0.55"/>

    <!-- Desert ground -->
    <rect y="62" width="100" height="38" fill="url(#ground)"/>

    <!-- Highway disappearing toward the horizon -->
    <path d="M 35 100 L 48 62 L 52 62 L 65 100 Z" fill="#2A1A0F" opacity="0.85"/>

    <!-- Center-line dashes on the highway -->
    <rect x="49.5" y="65" width="1" height="3" fill="#FFF1B8" opacity="0.85"/>
    <rect x="49.4" y="72" width="1.2" height="4" fill="#FFF1B8" opacity="0.85"/>
    <rect x="49.2" y="82" width="1.6" height="5" fill="#FFF1B8" opacity="0.9"/>
    <rect x="49" y="92" width="2" height="6" fill="#FFF1B8" opacity="0.95"/>

    <!-- Subtle inner shadow for depth -->
    <rect width="100" height="100" fill="none" stroke="#0E2540" stroke-width="1.2" opacity="0.30"/>
  </g>
</svg>
