<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Golden hour sky — sun blooming low over the horizon -->
    <radialGradient id="sun" cx="50" cy="58" r="34" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FFE9B0"/>
      <stop offset="35%"  stop-color="#F2B863"/>
      <stop offset="70%"  stop-color="#D6824A"/>
      <stop offset="100%" stop-color="#7A3920"/>
    </radialGradient>
    <!-- Sky gradient — twilight amber fading to deep dusk -->
    <linearGradient id="sky" x1="50" y1="0" x2="50" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1F140A"/>
      <stop offset="55%"  stop-color="#3A2410"/>
      <stop offset="100%" stop-color="#A05B2A"/>
    </linearGradient>
    <!-- Desert ground — warm sand fading darker -->
    <linearGradient id="ground" x1="50" y1="60" x2="50" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#B8753E"/>
      <stop offset="55%"  stop-color="#5E3614"/>
      <stop offset="100%" stop-color="#2A1808"/>
    </linearGradient>
    <!-- Soft amber bloom radiating outward from the sun -->
    <radialGradient id="bloom" cx="50" cy="58" r="45" gradientUnits="userSpaceOnUse">
      <stop offset="40%"  stop-color="#F2B863" stop-opacity="0"/>
      <stop offset="100%" stop-color="#F2B863" stop-opacity="0.25"/>
    </radialGradient>
    <clipPath id="round">
      <rect width="100" height="100" rx="14"/>
    </clipPath>
  </defs>

  <g clip-path="url(#round)">
    <!-- Sky -->
    <rect width="100" height="60" fill="url(#sky)"/>

    <!-- Atmospheric bloom around the sun -->
    <rect width="100" height="100" fill="url(#bloom)"/>

    <!-- The sun, half-set on the horizon -->
    <circle cx="50" cy="58" r="20" fill="url(#sun)"/>

    <!-- Distant mountain silhouette -->
    <path d="M 0 60 L 12 50 L 22 56 L 34 46 L 46 54 L 58 44 L 70 52 L 82 46 L 100 56 L 100 60 Z"
          fill="#3A2010" opacity="0.55"/>

    <!-- Desert ground -->
    <rect y="60" width="100" height="40" fill="url(#ground)"/>

    <!-- Highway disappearing into the sun -->
    <path d="M 35 100 L 48 60 L 52 60 L 65 100 Z" fill="#1A0E05" opacity="0.85"/>

    <!-- Center-line dashes on the highway -->
    <rect x="49.5" y="63" width="1" height="3" fill="#EAC78A" opacity="0.85"/>
    <rect x="49.4" y="70" width="1.2" height="4" fill="#EAC78A" opacity="0.85"/>
    <rect x="49.2" y="80" width="1.6" height="5" fill="#EAC78A" opacity="0.9"/>
    <rect x="49" y="91" width="2" height="6" fill="#EAC78A" opacity="0.95"/>

    <!-- Subtle inner shadow for depth -->
    <rect width="100" height="100" fill="none" stroke="#050403" stroke-width="1.2" opacity="0.35"/>
  </g>
</svg>
