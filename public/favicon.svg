<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Golden light flooding through the arch -->
    <radialGradient id="portal" cx="50" cy="45" r="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FFF8D8"/>
      <stop offset="22%"  stop-color="#F7CC48"/>
      <stop offset="58%"  stop-color="#C47818"/>
      <stop offset="100%" stop-color="#5A2C08"/>
    </radialGradient>
    <!-- Atmospheric bloom bleeding into the background -->
    <radialGradient id="atmo" cx="50" cy="52" r="50" gradientUnits="userSpaceOnUse">
      <stop offset="35%"  stop-color="#EAC05E" stop-opacity="0"/>
      <stop offset="100%" stop-color="#EAC05E" stop-opacity="0.20"/>
    </radialGradient>
    <!-- Frame: warm amber-brown, lighter at crown -->
    <linearGradient id="frame" x1="50" y1="8" x2="50" y2="92" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#9A6828"/>
      <stop offset="100%" stop-color="#4E3012"/>
    </linearGradient>
    <!-- Keystone sits slightly brighter than the frame -->
    <linearGradient id="key-g" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#C08030"/>
      <stop offset="100%" stop-color="#8A5520"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="14" fill="#050403"/>

  <!-- Atmospheric amber bloom -->
  <rect width="100" height="100" rx="14" fill="url(#atmo)"/>

  <!-- Arch frame (outer shape) — spring line at y=50, outer radius 40 -->
  <path d="M 10 92 L 10 50 A 40 40 0 0 1 90 50 L 90 92 Z" fill="url(#frame)"/>

  <!-- Arch opening — golden light beyond the door, inner radius 32 -->
  <path d="M 18 92 L 18 50 A 32 32 0 0 1 82 50 L 82 92 Z" fill="url(#portal)"/>

  <!-- Keystone at the crown -->
  <polygon points="43,20 44.5,8 55.5,8 57,20" fill="url(#key-g)"/>
  <line x1="50" y1="8" x2="50" y2="20" stroke="#3A1E08" stroke-width="0.9" opacity="0.55"/>

  <!-- Soft halo at crown of the arch interior -->
  <ellipse cx="50" cy="38" rx="14" ry="9" fill="#FFF8D8" opacity="0.30"/>

  <!-- Threshold / floor bar -->
  <rect x="18" y="88" width="64" height="4" rx="0.5" fill="#3A2010" opacity="0.75"/>

  <!-- Subtle inner-edge shadow for depth -->
  <path d="M 18 92 L 18 50 A 32 32 0 0 1 82 50 L 82 92 Z"
        fill="none" stroke="#050403" stroke-width="1.5" opacity="0.28"/>
</svg>
