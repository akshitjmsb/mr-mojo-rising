<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Deep monsoon forest background, darker at top -->
    <linearGradient id="bg" x1="50" y1="0" x2="50" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0E1509"/>
      <stop offset="55%"  stop-color="#080C07"/>
      <stop offset="100%" stop-color="#040704"/>
    </linearGradient>
    <!-- Petrichor mist rising from earth below -->
    <radialGradient id="mist" cx="50" cy="92" r="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#78986A" stop-opacity="0.28"/>
      <stop offset="50%"  stop-color="#485838" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#485838" stop-opacity="0"/>
    </radialGradient>
    <!-- Amber chai lantern glow behind the raindrop -->
    <radialGradient id="glow" cx="50" cy="52" r="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#C8893A" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#C8893A" stop-opacity="0"/>
    </radialGradient>
    <!-- Raindrop fill — warm amber lantern light caught in the drop -->
    <linearGradient id="drop" x1="40" y1="20" x2="62" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#EDE8DC"/>
      <stop offset="45%"  stop-color="#C8893A"/>
      <stop offset="100%" stop-color="#8C5A28"/>
    </linearGradient>
    <clipPath id="round">
      <rect width="100" height="100" rx="14"/>
    </clipPath>
  </defs>

  <g clip-path="url(#round)">
    <!-- Background: monsoon forest dusk -->
    <rect width="100" height="100" fill="url(#bg)"/>

    <!-- Petrichor mist bloom from wet earth -->
    <rect width="100" height="100" fill="url(#mist)"/>

    <!-- Amber lantern glow behind drop -->
    <rect width="100" height="100" fill="url(#glow)"/>

    <!-- Mossy ground line — a rooftop edge in the rain -->
    <line x1="0" y1="88" x2="100" y2="88" stroke="#364428" stroke-width="0.7" opacity="0.6"/>

    <!-- The raindrop — caught mid-fall, lantern light inside -->
    <path d="M 50 18
             C 50 18 28 50 28 62
             A 22 22 0 0 0 72 62
             C 72 50 50 18 50 18 Z"
          fill="url(#drop)"
          stroke="#485838"
          stroke-width="1.8"
          stroke-linejoin="round"/>

    <!-- Highlight shimmer inside the drop — a streak of monsoon light -->
    <path d="M 44 40 Q 42 54 43 63"
          fill="none"
          stroke="#EDE8DC"
          stroke-width="1.4"
          stroke-linecap="round"
          opacity="0.35"/>

    <!-- Two small rain streaks above — it's raining -->
    <line x1="35" y1="10" x2="33" y2="20" stroke="#6A8FA0" stroke-width="1.1" stroke-linecap="round" opacity="0.55"/>
    <line x1="66" y1="6"  x2="64" y2="16" stroke="#6A8FA0" stroke-width="1.1" stroke-linecap="round" opacity="0.45"/>
    <line x1="78" y1="14" x2="76" y2="22" stroke="#6A8FA0" stroke-width="0.9" stroke-linecap="round" opacity="0.35"/>

    <!-- Outer border for depth -->
    <rect width="100" height="100" fill="none" stroke="#263418" stroke-width="1.2" opacity="0.55"/>
  </g>
</svg>
