# Cloudflare Tunnel config for Mr. Mojo Rising Mac server
# Replace <TUNNEL_ID> with your actual tunnel ID

tunnel: <TUNNEL_ID>
credentials-file: /Users/<username>/.cloudflared/<TUNNEL_ID>.json

ingress:
  - hostname: mojo-api.yourdomain.com
    service: http://localhost:8000
  - service: http_status:404
